name: AI Issue Analysis

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze"
        required: true
        type: number

jobs:
  copilot-analysis:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.action == 'created' &&
       contains(github.event.comment.body, '@github-actions') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      # 这个 workflow 只用于当前 action 仓库自测。
      # 其他仓库请复制 examples/ai-issue-analysis.yml，并使用远程 uses 引用。
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 推荐配套：
      # - .claude/skills/generic-issue-log-analysis/SKILL.md
      #
      # ═══════════════════════════════════════════════════════════════
      # 方式一：LiteLLM（显式传入 vars.LLM_CONFIG）
      # 只需在仓库 Settings → Secrets and variables → Actions 里创建：
      #   Variable  LLM_CONFIG     → 包含 provider / model / api_key 等的 JSON
      #   Secret    DEEPSEEK_API_KEY (或其他密钥名) → API Key
      # workflow 显式把 vars.LLM_CONFIG 传给 llm-config-json，避免复合 action 读取调用方变量时的上下文差异。
      # ═══════════════════════════════════════════════════════════════
      - name: Analyze issue with AI
        id: analysis
        uses: ./
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          checkout-repository: "false"
          llm-config-json: ${{ vars.LLM_CONFIG }}
          bot-name: "@github-actions"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ═══════════════════════════════════════════════════════════════
      # 方式二：Copilot CLI（兼容回退）
      # 未传 llm-config-json 时可回退到 Copilot CLI。
      # 需在 Settings → Secrets and variables → Actions 里创建：
      #   Secret  COPILOT_GITHUB_TOKEN → Copilot Fine-grained token
      # ═══════════════════════════════════════════════════════════════
      # - name: Analyze issue with AI
      #   id: analysis
      #   uses: ./
      #   env:
      #     LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      #     DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #   with:
      #     copilot-github-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      #     bot-name: "@github-actions"
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     copilot-model: gpt-5.4
      #     copilot-reasoning-effort: xhigh

      - name: 查看完整输入输出
        if: always()
        env:
          ANALYSIS_PROMPT: ${{ steps.analysis.outputs.analysis-prompt }}
          ISSUE_NUMBER: ${{ steps.analysis.outputs.issue-number }}
          COMMENT_ID: ${{ steps.analysis.outputs.comment-id }}
          COMMENT_URL: ${{ steps.analysis.outputs.comment-url }}
          COPILOT_OUTPUT: ${{ steps.analysis.outputs.copilot-output }}
          FINAL_CONCLUSION: ${{ steps.analysis.outputs.final-conclusion }}
        run: |
          printf '%s\n' "$ANALYSIS_PROMPT"
          echo "issue_number=$ISSUE_NUMBER"
          echo "comment_id=$COMMENT_ID"
          echo "comment_url=$COMMENT_URL"
          printf '%s\n' "$COPILOT_OUTPUT"
          printf '%s\n' "$FINAL_CONCLUSION"
