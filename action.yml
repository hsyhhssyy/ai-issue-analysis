name: AI Issue Analysis
description: Analyze a GitHub issue with AI and keep a comment updated with progress and the final result.
author: MistEO

inputs:
  issue-number:
    description: Issue number to analyze. If empty, the action infers it from the current event or a workflow_dispatch input named issue_number.
    required: false
    default: ""
  github-token:
    description: GitHub token used to create and update issue comments.
    required: true
  copilot-github-token:
    description: Legacy fine-grained GitHub token with Copilot access for the Copilot CLI fallback path. Supports multiple tokens, one per line, and randomly picks one.
    required: false
    default: ""
  bot-name:
    description: Bot mention to strip from issue_comment messages before appending extra requirements.
    required: false
    default: ""
  initial-comment-body:
    description: Initial comment body shown before the analysis finishes.
    required: false
    default: |
      🤖 **AI 正在分析该 Issue...**  
      
      感谢您的反馈！AI 正在自动分析该问题，预计耗时约 10 分钟。
  action-link-text:
    description: Link text shown for the current GitHub Actions run.
    required: false
    default: GitHub Action 运行记录
  details-summary:
    description: Summary text used in the HTML details block that wraps the streaming output.
    required: false
    default: 点击此处展开分析过程
  prompt-template:
    description: Base prompt template. Supported placeholders are {{issue_number}}, {{copilot_answer_file}}, {{repository}}, and {{event_name}}.
    required: false
    default: 分析 GitHub Issue {{issue_number}}。把最终结论写到 {{copilot_answer_file}}。
  comment-prompt-template:
    description: Extra prompt appended when the triggering issue comment still has content after removing the bot mention. Supported placeholders also include {{comment_body}}.
    required: false
    default: 补充要求：{{comment_body}}
  llm-config-json:
    description: JSON object or array describing the LiteLLM model config. Supports fields such as provider, model, api_key, api_base or base_url, reasoning_effort, headers, and litellm_params.
    required: false
    default: ""
  litellm-package:
    description: Python package spec used to install LiteLLM for the llm-config-json path.
    required: false
    default: litellm
  analysis-max-iterations:
    description: Maximum tool-calling iterations for the LiteLLM analysis runner.
    required: false
    default: "12"
  copilot-model:
    description: Legacy Copilot CLI model name for the fallback path.
    required: false
    default: gpt-5.4
  copilot-reasoning-effort:
    description: Legacy Copilot CLI reasoning effort for the fallback path.
    required: false
    default: xhigh
  stream-update-interval-seconds:
    description: Number of seconds between streamed comment updates.
    required: false
    default: "30"
  cache-dir:
    description: Directory used for temporary prompt, output, and comment files.
    required: false
    default: .cache
  copilot-answer-file:
    description: File path where the prompt asks Copilot to write the final answer.
    required: false
    default: copilot_answer.md
  copilot-package:
    description: NPM package to install for the legacy Copilot CLI fallback path.
    required: false
    default: "@github/copilot"
  checkout-repository:
    description: Whether to run actions/checkout inside the action before analysis.
    required: false
    default: "true"
  process-error-message:
    description: Fallback message shown in the full analysis log when the Copilot answer file is not found.
    required: false
    default: 分析过程出现错误，请重试。
  result-error-message:
    description: Fallback message written into the final issue comment when the Copilot answer file is not found.
    required: false
    default: 分析结果出现错误，请重试。
  extra-comment-content:
    description: Extra content always appended at the bottom of every comment update. Empty by default.
    required: false
    default: ""

outputs:
  issue-number:
    description: Resolved issue number used for the run.
    value: ${{ steps.run_action.outputs.issue-number }}
  comment-id:
    description: The issue comment ID that was created and then updated.
    value: ${{ steps.run_action.outputs.comment-id }}
  comment-url:
    description: The URL of the issue comment that was created and then updated.
    value: ${{ steps.run_action.outputs.comment-url }}
  analysis-prompt:
    description: Final rendered prompt passed to Copilot for this run.
    value: ${{ steps.run_action.outputs.analysis-prompt }}
  copilot-output:
    description: Execution log including pre-run parameters, prompt, and Copilot stdout and stderr.
    value: ${{ steps.run_action.outputs.copilot-output }}
  final-conclusion:
    description: Final conclusion content produced by Copilot.
    value: ${{ steps.run_action.outputs.final-conclusion }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      if: ${{ inputs.checkout-repository == 'true' }}
      uses: actions/checkout@v4

    - name: Run issue analysis
      id: run_action
      shell: bash
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        GITHUB_API_URL: ${{ github.api_url }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_COPILOT_GITHUB_TOKEN: ${{ inputs.copilot-github-token }}
        INPUT_BOT_NAME: ${{ inputs.bot-name }}
        INPUT_INITIAL_COMMENT_BODY: ${{ inputs.initial-comment-body }}
        INPUT_ACTION_LINK_TEXT: ${{ inputs.action-link-text }}
        INPUT_DETAILS_SUMMARY: ${{ inputs.details-summary }}
        INPUT_PROMPT_TEMPLATE: ${{ inputs.prompt-template }}
        INPUT_COMMENT_PROMPT_TEMPLATE: ${{ inputs.comment-prompt-template }}
        INPUT_LLM_CONFIG_JSON: ${{ inputs.llm-config-json }}
        INPUT_LITELLM_PACKAGE: ${{ inputs.litellm-package }}
        INPUT_ANALYSIS_MAX_ITERATIONS: ${{ inputs.analysis-max-iterations }}
        INPUT_COPILOT_MODEL: ${{ inputs.copilot-model }}
        INPUT_COPILOT_REASONING_EFFORT: ${{ inputs.copilot-reasoning-effort }}
        INPUT_STREAM_UPDATE_INTERVAL_SECONDS: ${{ inputs.stream-update-interval-seconds }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_COPILOT_ANSWER_FILE: ${{ inputs.copilot-answer-file }}
        INPUT_COPILOT_PACKAGE: ${{ inputs.copilot-package }}
        INPUT_PROCESS_ERROR_MESSAGE: ${{ inputs.process-error-message }}
        INPUT_RESULT_ERROR_MESSAGE: ${{ inputs.result-error-message }}
        INPUT_EXTRA_COMMENT_CONTENT: ${{ inputs.extra-comment-content }}
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/run_action.py"

    - name: Upload Copilot output artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: copilot-output-issue-${{ steps.run_action.outputs.issue-number || 'unknown' }}-comment-${{ steps.run_action.outputs.comment-id || 'none' }}
        path: ${{ steps.run_action.outputs.copilot-output-artifact-file }}
        if-no-files-found: error

    - name: Upload final conclusion artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: final-conclusion-issue-${{ steps.run_action.outputs.issue-number || 'unknown' }}-comment-${{ steps.run_action.outputs.comment-id || 'none' }}
        path: ${{ steps.run_action.outputs.final-conclusion-artifact-file }}
        if-no-files-found: error

    - name: Fail action if analysis failed
      if: ${{ always() }}
      shell: bash
      env:
        ANALYSIS_SUCCESS: ${{ steps.run_action.outputs.analysis-success }}
        FAILURE_MESSAGE: ${{ steps.run_action.outputs.failure-message }}
      run: |
        if [ "$ANALYSIS_SUCCESS" != "true" ]; then
          echo "::error::$FAILURE_MESSAGE"
          exit 1
        fi
